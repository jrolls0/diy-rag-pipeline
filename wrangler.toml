name = "diy-rag-pipeline"
main = "src/index.ts"
compatibility_date = "2025-09-23"
# account_id = "<YOUR_ACCOUNT_ID>"  # Replace with your Cloudflare account ID

# R2 bucket for raw file storage
[[r2_buckets]]
binding = "R2"
bucket_name = "rag-documents"

# D1 database for document metadata + text chunks
[[d1_databases]]
binding = "DB"
database_name = "rag-db"
database_id = "<YOUR_D1_DATABASE_ID>"  # Replace after running: npx wrangler d1 create rag-db

# Vectorize index for semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "rag-vectors-v2"

# Workers AI binding (routed through AI Gateway for observability)
[ai]
binding = "AI"

[ai.gateway]
id = "rag-gateway"

# Durable Object for per-user-per-KB conversation history
[durable_objects]
bindings = [
  { name = "USER_SESSION", class_name = "UserSession" }
]

# Required: tells Cloudflare to register the UserSession class on first deploy
[[migrations]]
tag = "v1"
new_classes = ["UserSession"]

# Allow importing .css and .txt files as text modules
[[rules]]
type = "Text"
globs = ["**/*.css", "**/*.txt"]
