name = "diy-rag-pipeline"
main = "src/index.ts"
compatibility_date = "2025-09-23"
account_id = "0ad7f58c66c1a57a20e5dc53725ffc1b"

# R2 bucket for raw file storage
[[r2_buckets]]
binding = "R2"
bucket_name = "rag-documents"

# D1 database for document metadata + text chunks
[[d1_databases]]
binding = "DB"
database_name = "rag-db"
database_id = "6ef268dd-4899-415f-be62-76b856f38ec6"

# Vectorize index for semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "rag-vectors-v2"

# Workers AI binding (routed through AI Gateway for observability)
[ai]
binding = "AI"

[ai.gateway]
id = "rag-gateway"

# Allow importing .css and .txt files as text modules
[[rules]]
type = "Text"
globs = ["**/*.css", "**/*.txt"]
